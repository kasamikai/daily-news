<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日熱點 Daily Brief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --paper: #f9f7f4;
    --header-bg: #0f1923;
    --accent: #e63946;
    --muted: #6b7280;
    --rule: #e0dbd3;
    --rank-colors: #e63946, #f4803a, #f9b233, #4caf7d, #2196f3, #9c27b0, #00bcd4, #ff5722, #607d8b, #795548;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    color: #fff;
    padding: 0 2rem;
  }

  .header-inner {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 0 2rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .masthead {
    font-family: 'DM Serif Display', 'Noto Serif TC', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .masthead span {
    color: var(--accent);
  }

  .header-meta {
    text-align: right;
  }

  .header-date {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-tagline {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    margin-top: 0.25rem;
  }

  .header-strip {
    max-width: 860px;
    margin: 0 auto;
    padding: 0.75rem 0;
    font-size: 0.72rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── MAIN ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 2rem 4rem;
  }

  .section-label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 2px solid var(--ink);
    padding-top: 0.5rem;
    margin-bottom: 1.8rem;
  }

  /* ── NEWS CARD ── */
  .news-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .news-card {
    display: grid;
    grid-template-columns: 3.5rem 1fr;
    gap: 0 1.5rem;
    padding: 1.6rem 0;
    border-bottom: 1px solid var(--rule);
    position: relative;
    transition: background 0.15s;
  }

  .news-card:hover {
    background: rgba(0,0,0,0.02);
    margin: 0 -1rem;
    padding-left: 1rem;
    padding-right: 1rem;
    border-radius: 4px;
  }

  /* 排名條 — 簽名元素 */
  .rank-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0.2rem;
  }

  .rank-bar {
    width: 3px;
    height: 100%;
    min-height: 60px;
    border-radius: 2px;
    flex: 1;
  }

  .rank-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    line-height: 1;
    margin-bottom: 0.5rem;
    font-weight: 400;
  }

  .content-col {}

  .news-source {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .news-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 0.5rem;
    color: var(--ink);
  }

  .news-desc {
    font-size: 0.88rem;
    color: #444;
    line-height: 1.75;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--rule);
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── LOADING / ERROR ── */
  .state-msg {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .state-msg strong {
    display: block;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  @media (max-width: 520px) {
    .header-inner { flex-direction: column; align-items: flex-start; }
    .header-meta { text-align: left; }
    .news-card { grid-template-columns: 2.8rem 1fr; gap: 0 1rem; }
    .rank-num { font-size: 1.2rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .news-card { transition: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="masthead">每日熱點<span>.</span></div>
    <div class="header-meta">
      <div class="header-date" id="headerDate">載入中</div>
      <div class="header-tagline">Top 10 · Daily Brief</div>
    </div>
  </div>
  <div class="header-strip">全球 &amp; 台灣 · 前十大熱門話題</div>
</header>

<main>
  <div class="section-label">今日焦點報導</div>
  <div class="news-list" id="newsList">
    <div class="state-msg"><strong>載入中⋯</strong>正在讀取今日新聞資料</div>
  </div>
</main>

<footer id="footer"></footer>

<script>
  const RANK_COLORS = [
    '#e63946','#f4803a','#f9b233','#4caf7d','#2196f3',
    '#9c27b0','#00bcd4','#ff5722','#607d8b','#795548'
  ];

  function formatDate(d) {
    return d.toLocaleDateString('zh-TW', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  }

  function renderNews(data) {
    const list = document.getElementById('newsList');
    const today = new Date();

    document.getElementById('headerDate').textContent = formatDate(today);
    document.getElementById('footer').textContent =
      `每日熱點 · ${today.getFullYear()} · 資料由 Claude AI 自動整理`;

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="state-msg"><strong>暫無資料</strong>請確認 daily_news.json 已正確產生</div>';
      return;
    }

    list.innerHTML = data.map((item, i) => {
      const color = RANK_COLORS[i] || '#888';
      return `
        <article class="news-card">
          <div class="rank-col">
            <div class="rank-num" style="color:${color}">${item.rank}</div>
            <div class="rank-bar" style="background:${color}; opacity:0.25;"></div>
          </div>
          <div class="content-col">
            <div class="news-source">${escHtml(item.source || '')}</div>
            <div class="news-title">${escHtml(item.title || '')}</div>
            <div class="news-desc">${escHtml(item.description || '')}</div>
          </div>
        </article>`;
    }).join('');
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // 讀取同目錄下的 daily_news.json
  fetch('daily_news.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(renderNews)
    .catch(err => {
      document.getElementById('newsList').innerHTML =
        `<div class="state-msg"><strong>無法載入資料</strong>請將 daily_news.json 放在與此 HTML 相同的資料夾中<br><small style="color:#aaa">${err.message}</small></div>`;
      document.getElementById('headerDate').textContent = formatDate(new Date());
    });
</script>
</body>
</html>
