<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日熱點 Daily Brief</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --paper: #f9f7f4;
    --header-bg: #0f1923;
    --accent: #e63946;
    --muted: #6b7280;
    --rule: #e0dbd3;
    --sidebar-bg: #f2efe9;
    --card-active: #0f1923;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--header-bg);
    color: #fff;
    padding: 0 2rem;
    flex-shrink: 0;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 0 1.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .masthead {
    font-family: 'DM Serif Display', 'Noto Serif TC', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .masthead span { color: var(--accent); }

  .header-meta { text-align: right; }

  .header-date {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-tagline {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    margin-top: 0.2rem;
  }

  .header-strip {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.6rem 0;
    font-size: 0.68rem;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .layout {
    display: flex;
    flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--rule);
    padding: 1.5rem 1rem;
    overflow-y: auto;
    max-height: calc(100vh - 110px);
    position: sticky;
    top: 0;
  }

  .sidebar-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 2px solid var(--ink);
    padding-top: 0.4rem;
    margin-bottom: 1rem;
  }

  .date-card {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 0.85rem 1rem;
    margin-bottom: 0.6rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .date-card:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .date-card.active {
    background: var(--card-active);
    border-color: var(--card-active);
  }

  .date-card-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .date-card.active .date-card-accent { opacity: 1; }

  .date-card-date {
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .date-card.active .date-card-date { color: rgba(255,255,255,0.45); }

  .date-card-headline {
    font-family: 'Noto Serif TC', serif;
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1.45;
    color: var(--ink);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .date-card.active .date-card-headline { color: #fff; }

  .date-card-count {
    font-size: 0.62rem;
    color: var(--muted);
    margin-top: 0.35rem;
  }

  .date-card.active .date-card-count { color: rgba(255,255,255,0.35); }

  .content {
    flex: 1;
    padding: 2rem 2.5rem 4rem;
    min-width: 0;
  }

  .content-header {
    margin-bottom: 1.8rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .content-date-label {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
  }

  .content-count-label {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 2px solid var(--ink);
    padding-top: 0.4rem;
    margin-bottom: 1.5rem;
  }

  .news-list { display: flex; flex-direction: column; }

  .news-card {
    display: grid;
    grid-template-columns: 3rem 1fr;
    gap: 0 1.5rem;
    padding: 1.5rem 0;
    border-bottom: 1px solid var(--rule);
    transition: background 0.12s;
  }

  .news-card:hover {
    background: rgba(0,0,0,0.02);
    margin: 0 -0.8rem;
    padding-left: 0.8rem;
    padding-right: 0.8rem;
    border-radius: 4px;
  }

  .rank-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0.1rem;
  }

  .rank-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    line-height: 1;
    margin-bottom: 0.4rem;
  }

  .rank-bar {
    width: 3px;
    flex: 1;
    min-height: 36px;
    border-radius: 2px;
  }

  .news-source {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.3rem;
  }

  .news-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(0.98rem, 2vw, 1.12rem);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 0.45rem;
  }

  /* 標題連結樣式 */
  .news-title a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s, color 0.15s;
  }

  .news-title a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .news-title a::after {
    content: ' ↗';
    font-size: 0.75em;
    opacity: 0;
    transition: opacity 0.15s;
    font-family: sans-serif;
  }

  .news-title a:hover::after {
    opacity: 1;
  }

  .news-desc {
    font-size: 0.86rem;
    color: #444;
    line-height: 1.8;
  }

  .search-hint {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }

  .search-hint svg {
    width: 12px;
    height: 12px;
    opacity: 0.5;
  }

  .state-msg {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .state-msg strong {
    display: block;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.68rem;
    color: var(--muted);
    border-top: 1px solid var(--rule);
    background: var(--sidebar-bg);
  }

  @media (max-width: 680px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      max-height: none;
      position: static;
      display: flex;
      gap: 0.6rem;
      overflow-x: auto;
      padding: 1rem;
      border-right: none;
      border-bottom: 1px solid var(--rule);
    }
    .sidebar-label { display: none; }
    .date-card { min-width: 170px; margin-bottom: 0; flex-shrink: 0; }
    .content { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="masthead">每日熱點<span>.</span></div>
    <div class="header-meta">
      <div class="header-date" id="headerDate">載入中</div>
      <div class="header-tagline">Top 10 · Daily Brief</div>
    </div>
  </div>
  <div class="header-strip">全球 &amp; 台灣 · 前十大熱門話題</div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">歷史日期</div>
    <div id="dateList"><div style="font-size:0.8rem;color:var(--muted);padding:0.5rem 0;">載入中⋯</div></div>
  </aside>
  <main class="content">
    <div id="newsContent">
      <div class="state-msg"><strong>載入中⋯</strong>正在從試算表讀取資料</div>
    </div>
  </main>
</div>

<footer>每日熱點 Daily Brief · 資料由 AI 自動整理 · 點擊標題可搜尋相關新聞</footer>

<script>
  const SHEET_ID = '1iimFj_-tx0OZDmC0RO6N5G7MxHAakjzYoBcbPmeHiK8';
  const RANK_COLORS = [
    '#e63946','#f4803a','#f9b233','#4caf7d','#2196f3',
    '#9c27b0','#00bcd4','#ff5722','#607d8b','#795548'
  ];

  function escHtml(str) {
    return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function googleNewsUrl(title) {
    return 'https://news.google.com/search?q=' + encodeURIComponent(title) + '&hl=zh-TW&gl=TW&ceid=TW:zh-Hant';
  }

  async function fetchSheet(sheetName) {
    const encoded = encodeURIComponent(sheetName);
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encoded}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('無法讀取頁籤：' + sheetName);
    return res.text();
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n').slice(1);
    return lines.map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      return {
        rank: parseInt(cols[1]) || 0,
        title: cols[2] || '',
        description: cols[3] || '',
        source: cols[4] || ''
      };
    }).filter(item => item.title);
  }

  let allData = [];
  let activeDate = null;

  function renderSidebar(activeD) {
    const container = document.getElementById('dateList');
    container.innerHTML = allData.map(({ date, items }) => {
      const isActive = date === activeD;
      const headline = items?.[0]?.title || '載入中⋯';
      const count = items ? items.length : '—';
      return `
        <div class="date-card ${isActive ? 'active' : ''}" onclick="showDate('${date}')">
          <div class="date-card-accent"></div>
          <div class="date-card-date">${date}</div>
          <div class="date-card-headline">${escHtml(headline)}</div>
          <div class="date-card-count">共 ${count} 則報導</div>
        </div>`;
    }).join('');
  }

  function renderNews(date, items) {
    document.getElementById('headerDate').textContent = date;
    if (!items || items.length === 0) {
      document.getElementById('newsContent').innerHTML =
        '<div class="state-msg"><strong>無資料</strong>此日期尚無新聞記錄</div>';
      return;
    }
    document.getElementById('newsContent').innerHTML = `
      <div class="content-header">
        <div class="content-date-label">${date}</div>
        <div class="content-count-label">前 ${items.length} 大熱點</div>
      </div>
      <div class="section-label">今日焦點報導 · 點擊標題搜尋相關新聞</div>
      <div class="news-list">
        ${items.map((item, i) => {
          const color = RANK_COLORS[i] || '#888';
          const searchUrl = googleNewsUrl(item.title);
          return `
            <article class="news-card">
              <div class="rank-col">
                <div class="rank-num" style="color:${color}">${item.rank}</div>
                <div class="rank-bar" style="background:${color};opacity:0.2;"></div>
              </div>
              <div>
                <div class="news-source">${escHtml(item.source)}</div>
                <div class="news-title">
                  <a href="${escHtml(searchUrl)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>
                </div>
                <div class="news-desc">${escHtml(item.description)}</div>
                <div class="search-hint">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                  </svg>
                  點擊標題在 Google 新聞搜尋相關報導
                </div>
              </div>
            </article>`;
        }).join('')}
      </div>`;
  }

  async function showDate(date) {
    activeDate = date;
    renderSidebar(date);

    const found = allData.find(d => d.date === date);
    if (!found) return;

    if (!found.items) {
      document.getElementById('newsContent').innerHTML =
        '<div class="state-msg"><strong>載入中⋯</strong></div>';
      try {
        const csv = await fetchSheet(date);
        found.items = parseCSV(csv);
      } catch(e) {
        found.items = [];
      }
      renderSidebar(date);
    }

    renderNews(date, found.items);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function init() {
    try {
      const indexCSV = await fetchSheet('_index');
      const dates = indexCSV.trim().split('\n')
        .slice(1)
        .map(l => l.replace(/"/g, '').trim())
        .filter(d => d.match(/^\d{4}\/\d+\/\d+$/))
        .sort().reverse();

      if (dates.length === 0) throw new Error('尚無新聞資料');

      allData = dates.map(date => ({ date, items: null }));

      const latest = allData[0];
      const csv = await fetchSheet(latest.date);
      latest.items = parseCSV(csv);

      renderSidebar(latest.date);
      renderNews(latest.date, latest.items);
      activeDate = latest.date;

    } catch(err) {
      document.getElementById('dateList').innerHTML =
        `<div style="font-size:0.75rem;color:#c00;padding:0.5rem 0;">${err.message}</div>`;
      document.getElementById('newsContent').innerHTML =
        `<div class="state-msg"><strong>載入失敗</strong>${err.message}</div>`;
    }
  }

  init();
</script>
</body>
</html>
